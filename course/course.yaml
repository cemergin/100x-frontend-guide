# ============================================================================
# The 100x Frontend Architect Guide — Interactive Course
# ============================================================================
# Compatible with: tech-skill-builder plugin for Claude Code
# Running project: TicketFlow — event discovery and ticketing app
#   Stack: React Native (Expo) + Next.js web dashboard
#   Deploy: EAS (mobile) + Vercel (web)
# ============================================================================

course:
  title: "The 100x Frontend Architect Guide"
  subtitle: "JavaScript, React, React Native, Expo, Vercel & Modern Frontend Mastery"
  version: "1.0.0"
  updated: "2026-04-07"
  running_project: "TicketFlow"
  running_project_description: >
    TicketFlow is an event discovery and ticketing app — think Resident Advisor meets
    Eventbrite. Built with React Native (Expo) for mobile and a Next.js web dashboard.
    It supports event browsing, ticket purchasing (Stripe), social features, real-time
    notifications, and venue discovery. Deployed via EAS (mobile) and Vercel (web)
    from a Turborepo monorepo.

tutoring_defaults:
  style: socratic
  pace: adaptive
  feedback: immediate
  scaffolding_decay: true
  exercise_types:
    - "🤔 Reflect"
    - "🔍 Explore"
    - "🛠️ Build"
    - "🐛 Debug"
    - "📐 Design"
    - "💡 Insight"
    - "🚀 Deploy"
    - "📊 Observe"
  tiers:
    - name: "🟢 Core"
      description: "Essential knowledge every frontend engineer needs"
    - name: "🟡 Deep Dive"
      description: "Intermediate patterns for scaling apps and teams"
    - name: "🔴 Expert"
      description: "Advanced architecture and production mastery"
  loops:
    - name: "Loop 1: Foundation"
      modules: "L1-M01 to L1-M20"
      scaffolding: "Heavy — starter code, guided steps, explanations"
      ticketflow_arc: "Empty folder → simple Expo app with basic screens, navigation, and first EAS build"
    - name: "Loop 2: Practice"
      modules: "L2-M01 to L2-M20"
      scaffolding: "Moderate — direction given, implementation is on the learner"
      ticketflow_arc: "Basic app → full-featured app with API integration, state management, testing, CI/CD, and monitoring"
    - name: "Loop 3: Mastery"
      modules: "L3-M01 to L3-M20"
      scaffolding: "Minimal — learner-driven, architect-level decisions"
      ticketflow_arc: "Single app → production-ready monorepo with web dashboard, design system, Vercel deployment, AI features, and operational readiness"

# ============================================================================
# LOOP 1: FOUNDATION (L1-M01 to L1-M20)
# Build the mental model. Heavy scaffolding.
# TicketFlow arc: empty folder → simple Expo app → basic screens → first EAS build
# ============================================================================

modules:

  # --------------------------------------------------------------------------
  # L1-M01 to L1-M05: JavaScript & TypeScript Foundations
  # --------------------------------------------------------------------------

  - id: L1-M01
    title: "JavaScript Engine — Execution Context & Call Stack"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [0]
    ticketflow: "No app yet — we are building the mental model of how JS runs under the hood"
    summary: "Understand how JavaScript actually executes: execution contexts, the call stack, hoisting, and the thread of execution. This is the foundation everything else builds on."
    exercises:
      - type: "🔍 Explore"
        description: "Step through a 10-line JS snippet and draw the call stack at each line — predict variable values before running"
      - type: "🤔 Reflect"
        description: "Why does JavaScript use a single-threaded model? What are the trade-offs vs multi-threaded languages?"
      - type: "🛠️ Build"
        description: "Write a function that demonstrates closure by creating a private counter — explain what the backpack/COVE contains"
    runs_locally: true
    prereqs: []

  - id: L1-M02
    title: "Async JavaScript — Event Loop, Promises & Microtasks"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: [0]
    ticketflow: "No app yet — mastering async patterns needed for every API call TicketFlow will make"
    summary: "Master the event loop, callback queue, microtask queue, promises, and async/await. Predict execution order in complex async scenarios."
    exercises:
      - type: "🐛 Debug"
        description: "Given 5 async code snippets with mixed setTimeout, Promise.then, and async/await — predict the exact console.log order, then verify"
      - type: "🛠️ Build"
        description: "Implement a retry function with exponential backoff using async/await — this pattern will power TicketFlow's API calls"
      - type: "💡 Insight"
        description: "Explain why await in a for-loop is different from Promise.all — when would TicketFlow use each pattern?"
    runs_locally: true
    prereqs: [L1-M01]

  - id: L1-M03
    title: "UI Development — DOM, Data Binding & Virtual DOM"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: ["0b"]
    ticketflow: "No app yet — understanding why React exists and what problem it solves"
    summary: "Learn how the DOM works as a C++ data structure, why direct DOM manipulation doesn't scale, how data binding evolved, and how the virtual DOM solves UI composition."
    exercises:
      - type: "🛠️ Build"
        description: "Build a tiny todo list with vanilla JS and direct DOM manipulation — feel the pain of imperative UI updates"
      - type: "🔍 Explore"
        description: "Implement a minimal virtual DOM diff algorithm (createElement, diff, patch) in under 50 lines"
      - type: "🤔 Reflect"
        description: "Why did React win over two-way data binding frameworks? What does one-way data flow buy you at scale?"
    runs_locally: true
    prereqs: [L1-M01]

  - id: L1-M04
    title: "React from First Principles — Components, Props & State"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: ["0c"]
    ticketflow: "No app yet — learning the React component model that TicketFlow is built on"
    summary: "Understand JSX compilation, component composition, props vs state, and the unidirectional data flow that makes React predictable."
    exercises:
      - type: "🛠️ Build"
        description: "Create a BalanceCard component that accepts amount and currency as props and formats them — this becomes a real TicketFlow component later"
      - type: "🔍 Explore"
        description: "Use the Babel REPL to see what JSX compiles to — explain the relationship between JSX, createElement, and the virtual DOM"
      - type: "🤔 Reflect"
        description: "Why are props read-only? What would break if a child component could mutate its parent's props?"
    runs_locally: true
    prereqs: [L1-M03]

  - id: L1-M05
    title: "React Hooks — useState, useEffect, useRef & Custom Hooks"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: ["0c"]
    ticketflow: "No app yet — mastering hooks that will drive every screen in TicketFlow"
    summary: "Deep dive into the hooks mental model: useState for state, useEffect for synchronization, useRef for escape hatches, and custom hooks for reuse."
    exercises:
      - type: "🛠️ Build"
        description: "Build a useDebounce hook and a useLocalStorage hook — both will be used in TicketFlow's search and preferences"
      - type: "🐛 Debug"
        description: "Fix three broken useEffect examples: missing dependencies, infinite loops, and stale closures"
      - type: "💡 Insight"
        description: "Explain the rules of hooks — why can't you call hooks inside conditions or loops? What does this tell you about React's internal data structure?"
    runs_locally: true
    prereqs: [L1-M04]

  # --------------------------------------------------------------------------
  # L1-M06 to L1-M08: TypeScript Essentials
  # --------------------------------------------------------------------------

  - id: L1-M06
    title: "TypeScript Essentials — Types, Inference & Unions"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: ["0d"]
    ticketflow: "No app yet — learning the type system that will catch bugs before they reach TicketFlow users"
    summary: "Learn TypeScript's type system from the ground up: primitives, type inference, union and intersection types, literal types, and type narrowing."
    exercises:
      - type: "🛠️ Build"
        description: "Type a Transaction interface for TicketFlow with amount, currency, status (union of literals), sender, and recipient"
      - type: "🔍 Explore"
        description: "Use the TypeScript Playground to experiment with type narrowing — how does TS know which branch of a union you're in?"
      - type: "🐛 Debug"
        description: "Fix 5 type errors in a provided code snippet without using 'any' — each error teaches a different TS concept"
    runs_locally: true
    prereqs: [L1-M05]

  - id: L1-M07
    title: "TypeScript Generics & Utility Types"
    tier: "🟡 Deep Dive"
    duration: "60 min"
    source_chapters: ["0d"]
    ticketflow: "No app yet — building reusable type patterns for TicketFlow's data layer"
    summary: "Master generics, constraints, and built-in utility types (Partial, Pick, Omit, Record). Build type-safe abstractions."
    exercises:
      - type: "🛠️ Build"
        description: "Create a generic ApiResponse<T> type that wraps data, error, and loading states — this becomes TicketFlow's standard API response shape"
      - type: "🔍 Explore"
        description: "Implement Pick and Omit from scratch using mapped types and keyof — understand how utility types actually work"
      - type: "🤔 Reflect"
        description: "When should you use generics vs union types vs function overloads? Give a TicketFlow example for each."
    runs_locally: true
    prereqs: [L1-M06]

  - id: L1-M08
    title: "TypeScript in React — Typing Components & Hooks"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: ["0c", "0d"]
    ticketflow: "No app yet — connecting TypeScript knowledge to React patterns"
    summary: "Type React components, props, hooks, events, and refs. Learn the React TypeScript patterns you'll use every day."
    exercises:
      - type: "🛠️ Build"
        description: "Type a generic List<T> component that renders any array of items with a renderItem prop — use it for TicketFlow's transaction list"
      - type: "🐛 Debug"
        description: "Fix type errors in a form component with onChange handlers, refs, and conditional rendering"
      - type: "💡 Insight"
        description: "Explain the difference between React.FC<Props> and function Component(props: Props) — which is preferred and why?"
    runs_locally: true
    prereqs: [L1-M06, L1-M05]

  # --------------------------------------------------------------------------
  # L1-M09 to L1-M13: Expo & React Native Setup
  # --------------------------------------------------------------------------

  - id: L1-M09
    title: "Expo Setup — Creating the TicketFlow App"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [5]
    ticketflow: "Fresh Expo project initialized with TypeScript template — app runs on simulator showing default Expo screen"
    summary: "Initialize a real Expo project, understand the file structure, run it on a simulator/device, and learn what Continuous Native Generation (CNG) means."
    exercises:
      - type: "🛠️ Build"
        description: "Run 'npx create-expo-app TicketFlow --template tabs' and get it running on your simulator — explore every file in the generated project"
      - type: "🔍 Explore"
        description: "Compare the Expo project structure to a bare React Native project — what files does CNG eliminate and why?"
      - type: "🤔 Reflect"
        description: "What is the trade-off between managed Expo and bare React Native? When would TicketFlow need to eject?"
    runs_locally: true
    prereqs: [L1-M08]

  - id: L1-M10
    title: "React Native Internals — How Your Code Becomes Pixels"
    tier: "🟡 Deep Dive"
    duration: "75 min"
    source_chapters: [1]
    ticketflow: "Same Expo project — now you understand what happens between your JSX and the native UI"
    summary: "Understand the New Architecture: JSI, Fabric, TurboModules, and how JS communicates with native. This mental model prevents entire categories of bugs."
    exercises:
      - type: "🔍 Explore"
        description: "Trace what happens when you write <View style={{flex: 1}}> — from JSX through reconciliation to a native UIView/Android.View"
      - type: "🤔 Reflect"
        description: "Why did React Native move from the Bridge to JSI? What performance problems did the old architecture cause?"
      - type: "💡 Insight"
        description: "Draw a diagram of the three threads (JS, UI, Shadow/Background) and explain which thread runs your event handlers vs layout calculations"
    runs_locally: true
    prereqs: [L1-M09]

  - id: L1-M11
    title: "Core Components & Layout with Flexbox"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [8]
    ticketflow: "TicketFlow has a styled home screen with a balance display, action buttons row, and placeholder transaction list"
    summary: "Master React Native's core components (View, Text, ScrollView, Image, Pressable) and the Flexbox layout model on mobile."
    exercises:
      - type: "🛠️ Build"
        description: "Build TicketFlow's home screen layout: balance card at top, row of action buttons (Send, Request, Scan), and a transaction list placeholder below"
      - type: "🐛 Debug"
        description: "Fix a layout that looks correct on iPhone 15 but breaks on smaller screens — learn about flex ratios and Dimensions"
      - type: "🔍 Explore"
        description: "Compare Flexbox in React Native vs CSS Flexbox — identify the three key differences (defaults, units, no grid)"
    runs_locally: true
    prereqs: [L1-M09]

  - id: L1-M12
    title: "Styling Approaches — NativeWind & StyleSheet"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [8]
    ticketflow: "TicketFlow home screen restyled with NativeWind/Tailwind classes, consistent color palette and spacing"
    summary: "Set up NativeWind (Tailwind for React Native), understand StyleSheet.create, and establish TicketFlow's visual identity."
    exercises:
      - type: "🛠️ Build"
        description: "Install NativeWind and restyle the TicketFlow home screen using Tailwind classes — set up a custom color palette in tailwind.config.js"
      - type: "🔍 Explore"
        description: "Compare StyleSheet.create vs NativeWind vs inline styles — measure if there's a performance difference using the React DevTools Profiler"
      - type: "📐 Design"
        description: "Create a spacing and color token system for TicketFlow — define primary, secondary, success, error, and neutral scales"
    runs_locally: true
    prereqs: [L1-M11]

  - id: L1-M13
    title: "Navigation with Expo Router"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: [7]
    ticketflow: "TicketFlow has tab navigation (Home, Send, Activity, Profile) with a stack navigator for transaction details"
    summary: "Set up file-based routing with Expo Router. Create tab navigation, stack navigation, and understand deep linking."
    exercises:
      - type: "🛠️ Build"
        description: "Set up TicketFlow's navigation: tabs for Home/Send/Activity/Profile, stack navigator for transaction details, and a modal for QR scanning"
      - type: "🔍 Explore"
        description: "Add a deep link that opens a specific transaction — test with 'npx uri-scheme open ticketflow://transaction/123'"
      - type: "🐛 Debug"
        description: "Fix a navigation issue where the back button doesn't work correctly after navigating from a deep link"
    runs_locally: true
    prereqs: [L1-M11]

  # --------------------------------------------------------------------------
  # L1-M14 to L1-M17: Building Screens & Basic State
  # --------------------------------------------------------------------------

  - id: L1-M14
    title: "Building the Send Money Screen"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: ["0c", 8]
    ticketflow: "TicketFlow has a working Send Money screen with contact picker, amount input with currency formatting, and confirmation step"
    summary: "Build a multi-step form screen using React state, controlled inputs, and basic validation. Practice component composition."
    exercises:
      - type: "🛠️ Build"
        description: "Build the Send Money flow: contact selection → amount entry with live currency formatting → confirmation screen → success animation"
      - type: "📐 Design"
        description: "Design the component hierarchy for the Send flow — which components own state vs receive props?"
      - type: "🐛 Debug"
        description: "Fix a bug where typing fast in the amount field causes the cursor to jump — understand controlled vs uncontrolled inputs"
    runs_locally: true
    prereqs: [L1-M12, L1-M13]

  - id: L1-M15
    title: "Lists & FlatList Performance"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [13]
    ticketflow: "TicketFlow's Activity tab shows a performant scrollable transaction history with pull-to-refresh"
    summary: "Replace ScrollView with FlatList for TicketFlow's transaction list. Understand virtualization, keyExtractor, and basic list optimization."
    exercises:
      - type: "🛠️ Build"
        description: "Build the Activity tab with FlatList: render 100+ mock transactions with date headers (SectionList), pull-to-refresh, and a loading footer"
      - type: "🔍 Explore"
        description: "Add console.log to renderItem and scroll — observe how virtualization works by seeing which items mount/unmount"
      - type: "💡 Insight"
        description: "Why does FlatList need keyExtractor? What happens to performance if you use array index as the key?"
    runs_locally: true
    prereqs: [L1-M14]

  - id: L1-M16
    title: "Local State Management with useState & useReducer"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [9]
    ticketflow: "TicketFlow screens use well-structured local state — form state in Send, filter state in Activity, user preferences in Profile"
    summary: "Learn when to use useState vs useReducer. Manage form state, filter state, and UI state across TicketFlow's screens."
    exercises:
      - type: "🛠️ Build"
        description: "Refactor the Send Money form to use useReducer — handle amount, recipient, note, and validation state in a single reducer"
      - type: "🤔 Reflect"
        description: "Map TicketFlow's state to three categories: server state (transactions), client state (UI filters), form state (send flow). Why does this separation matter?"
      - type: "🐛 Debug"
        description: "Fix a stale state bug in the Activity filter — toggling filters rapidly shows wrong results due to closure over old state"
    runs_locally: true
    prereqs: [L1-M15]

  - id: L1-M17
    title: "Context API — Sharing State Across Screens"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [9, "0c"]
    ticketflow: "TicketFlow has a theme context (light/dark mode) and an auth context (logged-in user info) shared across all screens"
    summary: "Use React Context for truly global state: authentication, theme, and app-wide settings. Understand when Context is the right tool vs when it isn't."
    exercises:
      - type: "🛠️ Build"
        description: "Create an AuthContext and ThemeContext for TicketFlow — wrap the app, consume in Profile and every screen's header"
      - type: "🔍 Explore"
        description: "Add React DevTools Profiler and toggle the theme — observe which components re-render. How many re-renders does a context change cause?"
      - type: "🤔 Reflect"
        description: "Why is putting everything in Context a bad idea? What's the performance implication of updating a Context value that 50 components consume?"
    runs_locally: true
    prereqs: [L1-M16]

  # --------------------------------------------------------------------------
  # L1-M18 to L1-M20: First Build & Deploy
  # --------------------------------------------------------------------------

  - id: L1-M18
    title: "Images, Icons & Assets"
    tier: "🟢 Core"
    duration: "45 min"
    source_chapters: [8, 5]
    ticketflow: "TicketFlow has a polished look with app icon, splash screen, vector icons for tabs, and optimized images"
    summary: "Set up app icons, splash screens, and learn image handling in Expo. Use expo-image for performance and vector icons for UI."
    exercises:
      - type: "🛠️ Build"
        description: "Add TicketFlow's app icon, configure the splash screen in app.json, set up @expo/vector-icons for tab icons, and use expo-image for user avatars"
      - type: "🔍 Explore"
        description: "Compare Image vs expo-image — load a list of 20 avatar images and observe memory usage and caching behavior"
      - type: "📐 Design"
        description: "Create TicketFlow's icon set requirements — which icons do you need for tabs, actions, and status indicators?"
    runs_locally: true
    prereqs: [L1-M13]

  - id: L1-M19
    title: "App Configuration & Environment Setup"
    tier: "🟢 Core"
    duration: "45 min"
    source_chapters: [5, 6]
    ticketflow: "TicketFlow has proper app.config.ts with environment-based configuration for dev/staging/production"
    summary: "Configure app.config.ts with dynamic values, set up environment variables, and understand Expo's config resolution."
    exercises:
      - type: "🛠️ Build"
        description: "Convert app.json to app.config.ts — add environment-based API URLs, app name suffixes (TicketFlow Dev), and bundle identifiers"
      - type: "🔍 Explore"
        description: "Run 'npx expo config' in different environments and compare the resolved output — understand how config plugins modify the native config"
      - type: "💡 Insight"
        description: "Why should API keys never go in app.config.ts for production? Where should they live instead?"
    runs_locally: true
    prereqs: [L1-M18]

  - id: L1-M20
    title: "First EAS Build — From Code to Binary"
    tier: "🟢 Core"
    duration: "90 min"
    source_chapters: [6]
    ticketflow: "TicketFlow has its first development build running on a real device via EAS Build"
    summary: "Set up EAS, configure build profiles, create your first development build, and install it on a device. This is the moment TicketFlow becomes a real app."
    exercises:
      - type: "🛠️ Build"
        description: "Run 'eas init', configure eas.json with development/preview/production profiles, and trigger your first development build"
      - type: "🚀 Deploy"
        description: "Install the development build on your physical device — test that hot reloading works over your local network"
      - type: "🤔 Reflect"
        description: "What is the difference between Expo Go, a development build, and a production build? When do you need each?"
    runs_locally: true
    prereqs: [L1-M19]

  # ============================================================================
  # LOOP 2: PRACTICE (L2-M01 to L2-M20)
  # Scale and build features. Moderate scaffolding.
  # TicketFlow arc: basic app → full-featured with API, monitoring, CI/CD
  # ============================================================================

  # --------------------------------------------------------------------------
  # L2-M01 to L2-M05: State Management & Data Fetching
  # --------------------------------------------------------------------------

  - id: L2-M01
    title: "Zustand — Client State Done Right"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [9]
    ticketflow: "TicketFlow uses Zustand stores for client state: user preferences, UI state, and onboarding progress"
    summary: "Replace Context-based state with Zustand. Learn store creation, selectors, persistence with MMKV, and why Zustand beats Context for client state."
    exercises:
      - type: "🛠️ Build"
        description: "Create a usePreferencesStore (currency, language, biometrics) and a useOnboardingStore — persist both with zustand/persist and MMKV"
      - type: "🔍 Explore"
        description: "Profile the app before and after migrating from Context to Zustand — measure the re-render reduction"
      - type: "🤔 Reflect"
        description: "When would you keep React Context instead of Zustand? Name two cases where Context is still the right choice."
    runs_locally: true
    prereqs: [L1-M20]

  - id: L2-M02
    title: "TanStack Query — Server State Fundamentals"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: [10]
    ticketflow: "TicketFlow fetches transactions, balances, and contacts from a mock API using TanStack Query with caching and loading states"
    summary: "Set up TanStack Query for all server data. Learn queries, query keys, stale time, cache time, and the mental model of server state vs client state."
    exercises:
      - type: "🛠️ Build"
        description: "Create useTransactions, useBalance, and useContacts query hooks — set up QueryClientProvider with sensible defaults for a mobile app"
      - type: "🔍 Explore"
        description: "Install React Query DevTools (Flipper plugin or Reactotron) — observe cache entries, refetch behavior, and stale/fresh transitions"
      - type: "💡 Insight"
        description: "Why is staleTime: 0 (the default) wrong for a mobile payment app? What staleTime would you set for balance vs transaction history?"
    runs_locally: true
    prereqs: [L2-M01]

  - id: L2-M03
    title: "TanStack Query — Mutations & Optimistic Updates"
    tier: "🟡 Deep Dive"
    duration: "75 min"
    source_chapters: [10]
    ticketflow: "TicketFlow's Send Money flow uses mutations with optimistic balance updates and rollback on failure"
    summary: "Master mutations, optimistic updates, cache invalidation, and error rollback. Make TicketFlow's payment flow feel instant."
    exercises:
      - type: "🛠️ Build"
        description: "Implement the sendMoney mutation with optimistic balance deduction — on success invalidate transactions, on error rollback the balance"
      - type: "🐛 Debug"
        description: "Fix a race condition where two rapid sends show incorrect balance — implement proper optimistic update with cancelQueries"
      - type: "📐 Design"
        description: "Design the cache invalidation strategy for TicketFlow — which queries should invalidate when a payment succeeds?"
    runs_locally: true
    prereqs: [L2-M02]

  - id: L2-M04
    title: "API Layer Architecture"
    tier: "🟡 Deep Dive"
    duration: "60 min"
    source_chapters: [10]
    ticketflow: "TicketFlow has a clean API layer: typed API client, request/response interceptors, auth token refresh, and error handling"
    summary: "Build a production API layer with typed endpoints, interceptors for auth, automatic token refresh, and centralized error handling."
    exercises:
      - type: "🛠️ Build"
        description: "Create TicketFlow's API client with axios/ky: base URL config, auth header interceptor, 401 → refresh token flow, and typed endpoint functions"
      - type: "📐 Design"
        description: "Design the error handling strategy — map HTTP status codes to user-facing error messages and recovery actions"
      - type: "🔍 Explore"
        description: "Add request/response logging in development — inspect the exact headers, body, and timing of each API call"
    runs_locally: true
    prereqs: [L2-M02]

  - id: L2-M05
    title: "Forms & Validation with React Hook Form + Zod"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: ["0d", 9]
    ticketflow: "TicketFlow's Send Money and Profile Edit screens use validated forms with Zod schemas and real-time error feedback"
    summary: "Replace manual form state with React Hook Form and Zod validation. Get type-safe, performant forms with great UX."
    exercises:
      - type: "🛠️ Build"
